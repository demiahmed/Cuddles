<!DOCTYPE html>
<html>
<head>
    <title>Simple Push Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Simple Push Notification Test</h1>
    <button onclick="testPush()">Test Everything</button>
    <div id="output"></div>
    
    <script>
        const VAPID_KEY = 'BPslBjReqITCyxu9e7YchOxRdRv1rwN9xWWTpKd2KsYAOBIz97JtqaYHUQDUD9vOdZZpeybfhq0khvg5S9vyEp8';
        
        function log(msg) {
            document.getElementById('output').innerHTML += '<p>' + msg + '</p>';
            console.log(msg);
        }
        
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }
        
        async function testPush() {
            try {
                // Check if we're on iOS Safari first
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
                
                if (isIOS && isSafari) {
                    log('🍎 iOS Safari detected - Push notifications not fully supported');
                    log('ℹ️ iOS Safari requires adding app to home screen and has limited push support');
                    return;
                }
                
                log('1. Checking service worker support...');
                if (!('serviceWorker' in navigator)) {
                    log('❌ Service Workers not supported');
                    return;
                }
                log('✅ Service Workers supported');
                
                log('2. Registering service worker...');
                const registration = await navigator.serviceWorker.register('/sw-custom.js');
                await navigator.serviceWorker.ready;
                log('✅ Service worker registered and ready');
                
                log('3. Requesting notification permission...');
                if (!('Notification' in window)) {
                    log('❌ Notifications not supported');
                    return;
                }
                const permission = await Notification.requestPermission();
                log('Permission: ' + permission);
                if (permission !== 'granted') {
                    log('❌ Permission denied');
                    return;
                }
                
                log('4. Checking push manager...');
                if (!registration.pushManager) {
                    log('❌ Push Manager not supported');
                    return;
                }
                log('✅ Push Manager supported');
                
                log('5. Creating subscription...');
                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_KEY)
                });
                log('✅ Subscription created');
                log('Endpoint: ' + subscription.endpoint);
                
                log('6. Sending to server...');
                const response = await fetch('/api/save-subscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        endpoint: subscription.endpoint,
                        keys: {
                            p256dh: btoa(String.fromCharCode.apply(null, new Uint8Array(subscription.getKey('p256dh')))),
                            auth: btoa(String.fromCharCode.apply(null, new Uint8Array(subscription.getKey('auth'))))
                        }
                    })
                });
                
                const result = await response.json();
                log('Server response: ' + result.message);
                
                log('7. Testing notification...');
                const testResponse = await fetch('/api/test-push');
                const testResult = await testResponse.json();
                log('Test result: ' + testResult.message);
                
                log('🎉 All done! Check for notifications.');
                
            } catch (error) {
                log('❌ Error: ' + error.message);
                console.error(error);
            }
        }
    </script>
</body>
</html>
